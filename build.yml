name: Build LA1shot

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  KIT_URL: "https://steam-synth.preview.emergentagent.com/la1shot-vst.zip"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
          - os: macos-latest
            name: macOS
          - os: ubuntu-latest
            name: Linux
    steps:
      - name: Fetch plugin source (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          curl -fL -o kit.zip "$KIT_URL"
          unzip -o kit.zip -d kit
          test -f kit/CMakeLists.txt || { echo "Source not found"; exit 1; }

      - name: Fetch plugin source (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl.exe -fL -o kit.zip "$env:KIT_URL"
          Expand-Archive -Path kit.zip -DestinationPath kit -Force
          if (-not (Test-Path kit/CMakeLists.txt)) { throw "Source not found" }

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libfreetype6-dev libfontconfig1-dev \
            libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev \
            libxrandr-dev libxrender-dev libglu1-mesa-dev mesa-common-dev

      - name: Configure
        run: cmake -B build -S kit -DCMAKE_BUILD_TYPE=Release

      - name: Build (Release)
        run: cmake --build build --config Release

      - name: Package (macOS / Linux)
        if: runner.os != 'Windows'
        run: |
          cd build/LA1shot_artefacts/Release
          zip -r "$GITHUB_WORKSPACE/LA1SHOT-${{ matrix.name }}.zip" .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path build/LA1shot_artefacts/Release/* -DestinationPath LA1SHOT-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LA1SHOT-${{ matrix.name }}
          path: LA1SHOT-${{ matrix.name }}.zip
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: LA1shot — Latest Build
          files: dist/**/*.zip
       
